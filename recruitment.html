<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruitment Tracker — Codeline.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="sidebar-spacer"></div>

  <div class="main-workspace" style="margin-left: 248px;">
    <div class="mobile-nav-bar" onclick="openSidebar()">
      ☰ <span>Menu</span>
    </div>

    <div class="header-block">
      <div class="title-area">
        <h1>🧑‍💼 Recruitment Tracker</h1>
        <p>Registered candidates ki pipeline yahan dikhti hai — step by step approve karein.</p>
      </div>
      <button class="btn-action" onclick="loadCandidates()">🔄 Refresh</button>
    </div>

    <!-- Stats -->
    <div class="rec-stats-bar" id="statsBar">
      <div class="rec-stat-chip">
        <div class="rec-stat-num" id="statTotal">—</div>
        <div class="rec-stat-lbl">Total Candidates</div>
      </div>
      <div class="rec-stat-chip">
        <div class="rec-stat-num" id="statApplied" style="color:#93C5FD">—</div>
        <div class="rec-stat-lbl">Applied</div>
      </div>
      <div class="rec-stat-chip">
        <div class="rec-stat-num" id="statScreening" style="color:#FCD34D">—</div>
        <div class="rec-stat-lbl">Screening</div>
      </div>
      <div class="rec-stat-chip">
        <div class="rec-stat-num" id="statInterview" style="color:#C4B5FD">—</div>
        <div class="rec-stat-lbl">Interview</div>
      </div>
      <div class="rec-stat-chip">
        <div class="rec-stat-num" id="statHired" style="color:#34D399">—</div>
        <div class="rec-stat-lbl">Hired</div>
      </div>
    </div>

    <!-- Search -->
    <div class="filter-deck">
      <input type="text" class="search-input-box" id="searchInput"
        placeholder="🔍  Naam, mobile, role se search karein…" oninput="filterAndRender()" />
    </div>

    <!-- Pipeline Board -->
    <div class="pipeline-board" id="pipelineBoard">
      <div class="rec-loading">Loading candidates…</div>
    </div>
  </div>

  <!-- Candidate Detail Drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="candidateDrawer">
    <div class="drawer-header">
      <h3>👤 Candidate Details</h3>
      <button class="drawer-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <div class="rec-loading">Loading…</div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    AppSession.protect();
    const TOKEN = AppSession.getToken();
    const USER = AppSession.getUser();
    const IS_ADMIN = USER && (USER.role === 'super_admin' || USER.role === 'hr');

    const STAGE_LABELS = {
      applied: 'Applied', screening: 'Screening',
      interview: 'Interview', offered: 'Offered',
      hired: 'Hired', rejected: 'Rejected'
    };
    const NEXT_STAGE = {
      applied: 'screening', screening: 'interview',
      interview: 'offered', offered: 'hired'
    };
    const NEXT_LABEL = {
      applied: '→ Screening', screening: '→ Interview',
      interview: '→ Offered', offered: '✓ Hire'
    };

    let allCandidates = [];
    let activeCandidateId = null;

    async function loadCandidates() {
      document.getElementById('pipelineBoard').innerHTML =
        '<div class="rec-loading" style="grid-column:1/-1">Loading candidates…</div>';
      try {
        const res = await fetch(
          `${API_URL}?action=getCandidates&token=${TOKEN}&_ts=${Date.now()}`,
          { cache: 'no-store' }
        );
        const payload = await res.json();
        if (payload.status === 'success') {
          allCandidates = payload.data || [];
          updateStats();
          filterAndRender();
        } else {
          showToast(payload.message || 'Error loading candidates.');
          document.getElementById('pipelineBoard').innerHTML =
            '<div class="rec-loading" style="grid-column:1/-1;color:var(--danger)">Error loading candidates.</div>';
        }
      } catch (e) {
        showToast('Network error — candidates could not be loaded.');
      }
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = allCandidates.length;
      document.getElementById('statApplied').textContent = allCandidates.filter(c => c.stage === 'applied').length;
      document.getElementById('statScreening').textContent = allCandidates.filter(c => c.stage === 'screening').length;
      document.getElementById('statInterview').textContent = allCandidates.filter(c => c.stage === 'interview').length;
      document.getElementById('statHired').textContent = allCandidates.filter(c => c.stage === 'hired').length;
    }

    function filterAndRender() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = q
        ? allCandidates.filter(c =>
          (c.name || '').toLowerCase().includes(q) ||
          (c.mobile || '').toLowerCase().includes(q) ||
          (c.role || '').toLowerCase().includes(q) ||
          (c.email || '').toLowerCase().includes(q) ||
          (c.department || '').toLowerCase().includes(q)
        )
        : allCandidates;
      renderPipeline(filtered);
    }

    function renderPipeline(candidates) {
      const board = document.getElementById('pipelineBoard');
      const cols = [
        { key: 'applied', label: 'Applied', cls: 'col-applied' },
        { key: 'screening', label: 'Screening', cls: 'col-screening' },
        { key: 'interview', label: 'Interview', cls: 'col-interview' },
        { key: 'offered', label: 'Offered', cls: 'col-offered' },
        { key: 'final', label: 'Hired / Rejected', cls: 'col-final' }
      ];
      board.innerHTML = cols.map(col => {
        const list = col.key === 'final'
          ? candidates.filter(c => c.stage === 'hired' || c.stage === 'rejected')
          : candidates.filter(c => c.stage === col.key);
        const cards = list.length === 0
          ? '<div class="col-empty-hint">Koi candidate nahi hai</div>'
          : list.map(c => renderCard(c)).join('');
        return `
          <div class="pipeline-col ${col.cls}">
            <div class="pipeline-col-head">
              <span class="col-title">${col.label}</span>
              <span class="col-count">${list.length}</span>
            </div>
            ${cards}
          </div>`;
      }).join('');
    }

    function renderCard(c) {
      const isFinal = c.stage === 'hired' || c.stage === 'rejected';
      const avatarHtml = c.photo_url
        ? `<img class="c-avatar" src="${c.photo_url}" alt="${c.name}" onerror="this.style.display='none'" />`
        : `<div class="c-avatar-placeholder">👤</div>`;
      let actionsHtml = '';
      if (IS_ADMIN && !isFinal) {
        const ns = NEXT_STAGE[c.stage];
        const nl = NEXT_LABEL[c.stage];
        actionsHtml = `
          <div class="c-actions">
            <button class="btn-view" onclick="event.stopPropagation(); openDrawer('${c.candidate_id}')">Details</button>
            <button class="btn-move" onclick="event.stopPropagation(); moveStage('${c.candidate_id}','${ns}')">${nl}</button>
            <button class="btn-move btn-reject" onclick="event.stopPropagation(); moveStage('${c.candidate_id}','rejected')">✕ Reject</button>
          </div>`;
      } else {
        actionsHtml = `
          <div class="c-actions">
            <button class="btn-view" onclick="event.stopPropagation(); openDrawer('${c.candidate_id}')">Details</button>
          </div>`;
      }
      const finalPill = isFinal
        ? `<span class="stage-pill stage-${c.stage}">${STAGE_LABELS[c.stage]}</span>`
        : '';
      return `
        <div class="candidate-card" onclick="openDrawer('${c.candidate_id}')">
          <div class="c-header">
            ${avatarHtml}
            <div>
              <div class="c-name">${c.name || '—'}</div>
              <div class="c-contact">${c.mobile || ''}</div>
            </div>
          </div>
          <div class="c-meta">${c.role || ''} ${c.department ? '· ' + c.department : ''}</div>
          <div class="c-tags">
            ${c.qualification ? `<span class="c-tag">${c.qualification}</span>` : ''}
            ${c.gender ? `<span class="c-tag">${c.gender}</span>` : ''}
          </div>
          ${finalPill}
          ${actionsHtml}
        </div>`;
    }

    function openDrawer(candidateId) {
      activeCandidateId = candidateId;
      const c = allCandidates.find(x => x.candidate_id === candidateId);
      if (!c) return;
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('candidateDrawer').classList.add('open');
      renderDrawer(c);
    }

    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('candidateDrawer').classList.remove('open');
      activeCandidateId = null;
    }

    function renderDrawer(c) {
      const isFinal = c.stage === 'hired' || c.stage === 'rejected';
      const photoHtml = c.photo_url
        ? `<img class="drawer-photo" src="${c.photo_url}" alt="${c.name}" onerror="this.outerHTML='<div class=drawer-photo-placeholder>👤</div>'" />`
        : `<div class="drawer-photo-placeholder">👤</div>`;
      const appliedDate = c.applied_on
        ? new Date(c.applied_on).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        : '—';
      const dobFormatted = c.dob
        ? new Date(c.dob).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        : (c.dob || '—');
      let stageActionsHtml = '';
      if (IS_ADMIN && !isFinal) {
        const ns = NEXT_STAGE[c.stage];
        const nl = NEXT_LABEL[c.stage];
        stageActionsHtml = `
          <div class="stage-action-row">
            <button class="btn-stage-action btn-approve" onclick="moveStage('${c.candidate_id}','${ns}')">${nl}</button>
            <button class="btn-stage-action btn-reject-drawer" onclick="moveStage('${c.candidate_id}','rejected')">✕ Reject</button>
          </div>`;
      }
      const stageLabel = STAGE_LABELS[c.stage] || c.stage;
      const signatureHtml = c.signature_url
        ? `<a href="${c.signature_url}" target="_blank" rel="noopener">
             <img class="signature-img" src="${c.signature_url}" alt="Signature" onerror="this.style.display='none'" />
           </a>`
        : '<span style="color:var(--text-muted);font-size:12px">Not uploaded</span>';
      const docLinks = [
        { label: '📄 Aadhar Card', url: c.aadhar_url },
        { label: '🎓 Experience / Degree', url: c.experience_doc_url },
        { label: '🖼️ Photo', url: c.photo_url },
      ].filter(d => d.url);
      const docLinksHtml = docLinks.length
        ? docLinks.map(d => `<a class="doc-link" href="${d.url}" target="_blank" rel="noopener">${d.label}</a>`).join('')
        : '<span style="color:var(--text-muted);font-size:12px">No documents</span>';

      document.getElementById('drawerBody').innerHTML = `
        <div class="drawer-photo-row">
          ${photoHtml}
          <div>
            <div class="drawer-name">${c.name}</div>
            <div class="drawer-sub">${c.role || ''} ${c.department ? '· ' + c.department : ''}</div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Current Stage</div>
          <span class="current-stage-badge badge-${c.stage}">${stageLabel.toUpperCase()}</span>
          ${stageActionsHtml}
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Personal Information</div>
          <div class="detail-row"><span class="d-label">Date of Birth</span><span class="d-value">${dobFormatted}</span></div>
          <div class="detail-row"><span class="d-label">Gender</span><span class="d-value">${c.gender || '—'}</span></div>
          <div class="detail-row"><span class="d-label">Mobile</span><span class="d-value">${c.mobile || '—'}</span></div>
          <div class="detail-row"><span class="d-label">Email</span><span class="d-value">${c.email || '—'}</span></div>
          <div class="detail-row"><span class="d-label">Current Address</span><span class="d-value">${c.current_address || '—'}</span></div>
          <div class="detail-row"><span class="d-label">Permanent Address</span><span class="d-value">${c.permanent_address || '—'}</span></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Professional Details</div>
          <div class="detail-row"><span class="d-label">Role</span><span class="d-value">${c.role || '—'}</span></div>
          <div class="detail-row"><span class="d-label">Department</span><span class="d-value">${c.department || '—'}</span></div>
          <div class="detail-row"><span class="d-label">Qualification</span><span class="d-value">${c.qualification || '—'}</span></div>
          <div class="detail-row"><span class="d-label">Applied On</span><span class="d-value">${appliedDate}</span></div>
          <div class="detail-row"><span class="d-label">Candidate ID</span><span class="d-value" style="font-size:11px;opacity:0.6">${c.candidate_id}</span></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Signature</div>
          ${signatureHtml}
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Uploaded Documents</div>
          ${docLinksHtml}
        </div>
      `;
    }

    async function moveStage(candidateId, newStage) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            token: TOKEN, action: 'updateCandidateStage',
            candidate_id: candidateId, stage: newStage
          })
        });
        const out = await res.json();
        if (out.status === 'success') {
          showToast('✓ Stage update ho gaya: ' + (STAGE_LABELS[newStage] || newStage));
          const idx = allCandidates.findIndex(c => c.candidate_id === candidateId);
          if (idx !== -1) allCandidates[idx].stage = newStage;
          updateStats();
          filterAndRender();
          if (activeCandidateId === candidateId) renderDrawer(allCandidates[idx]);
        } else {
          showToast(out.message || 'Error occurred.');
        }
      } catch (e) { showToast('Network error.'); }
    }

    document.addEventListener('DOMContentLoaded', loadCandidates);
  </script>

  <!-- Recruitment page styles — only use style.css variables, no hardcoded colors -->
  <style>
    /* ── Stats Bar ── */
    .rec-stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .rec-stat-chip {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      backdrop-filter: blur(16px);
    }

    .rec-stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .rec-stat-lbl {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .rec-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ── Pipeline Board ── */
    .pipeline-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(200px, 1fr));
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    @media (max-width: 1100px) {
      .pipeline-board {
        grid-template-columns: repeat(5, 220px);
      }
    }

    @media (max-width: 768px) {
      .main-workspace {
        margin-left: 0 !important;
      }
    }

    .pipeline-col {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 220px;
      backdrop-filter: blur(16px);
    }

    .pipeline-col-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .pipeline-col-head .col-title {
      font-size: 11.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pipeline-col-head .col-count {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--glass-bg);
      padding: 1px 8px;
      border-radius: 20px;
    }

    /* Column title colors using style.css accent palette */
    .col-applied .col-title {
      color: #93C5FD;
    }

    .col-screening .col-title {
      color: #FCD34D;
    }

    .col-interview .col-title {
      color: #C4B5FD;
    }

    .col-offered .col-title {
      color: var(--success);
    }

    .col-final .col-title {
      color: var(--text-muted);
    }

    .col-empty-hint {
      font-size: 11.5px;
      color: var(--text-dim);
      text-align: center;
      padding: 20px 4px;
    }

    /* ── Candidate Card ── */
    .candidate-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }

    .candidate-card:hover {
      background: var(--glass-hover);
      border-color: var(--glass-border-hi);
    }

    .c-header {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 4px;
    }

    .c-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--glass-border);
      flex-shrink: 0;
      background: var(--bg-layer3);
    }

    .c-avatar-placeholder {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .c-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .c-contact {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    .c-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .c-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .c-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--glass-bg);
      color: var(--text-muted);
      border: 1px solid var(--glass-border);
    }

    .c-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .btn-move {
      font-size: 10.5px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-primary);
      transition: background 0.15s;
    }

    .btn-move:hover {
      background: var(--glass-hover);
    }

    .btn-move.btn-reject {
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.25);
      background: var(--danger-dim);
    }

    .btn-view {
      font-size: 10.5px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      border: 1px solid rgba(108, 142, 255, 0.3);
      background: var(--accent-dim);
      color: var(--accent-hi);
      transition: background 0.15s;
    }

    .btn-view:hover {
      background: rgba(108, 142, 255, 0.22);
    }

    .stage-pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 5px;
    }

    .stage-hired {
      background: var(--success-dim);
      color: var(--success);
    }

    .stage-rejected {
      background: var(--danger-dim);
      color: var(--danger);
    }

    /* ── Drawer ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: none;
    }

    .drawer-overlay.open {
      display: block;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 100%;
      background: var(--bg-layer2);
      border-left: 1px solid var(--glass-border-hi);
      overflow-y: auto;
      z-index: 1001;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      position: sticky;
      top: 0;
      background: var(--bg-layer2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }

    .drawer-header h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      border-radius: var(--radius-xs);
    }

    .drawer-body {
      padding: 20px;
    }

    .drawer-photo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .drawer-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--glass-border);
      flex-shrink: 0;
      background: var(--bg-layer3);
    }

    .drawer-photo-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .drawer-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .drawer-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1px;
