<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KPI Tracking — Codeline.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-dark: #0A0F1E; --brand-accent: #3B82F6; --brand-glow: #60A5FA;
      --surface: #111827; --surface2: #1F2937; --border: #1F2937; --border2: #374151;
      --text-primary: #F9FAFB; --text-muted: #9CA3AF; --text-dim: #6B7280;
      --success: #10B981; --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--brand-dark); color: var(--text-primary); min-height: 100vh; display: flex; }
    .sidebar-spacer { width: 240px; flex-shrink: 0; }
    @media (max-width: 768px) { .sidebar-spacer { display: none; } }
    .main-workspace { flex: 1; display: flex; flex-direction: column; min-height: 100vh; padding: 24px; }
    .mobile-nav-bar { display: none; height: 50px; background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; padding: 0 16px; font-size: 20px; color: var(--text-muted); cursor: pointer; }
    @media (max-width: 768px) { .mobile-nav-bar { display: flex; } }
    .header-block { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
    .title-area h1 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; }
    .btn-action { background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; min-width: 800px; }
    .data-table th { background: #1E40AF; color: #fff; padding: 14px 16px; font-weight: 600; }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-card { background: var(--surface); border: 1px solid rgba(59,130,246,0.2); border-radius: var(--radius); max-width: 500px; width: 100%; }
    .modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 12.5px; color: var(--text-muted); text-transform: uppercase; }
    .form-group input, .form-group select { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: #fff; font-size: 14px; outline: none; }
  </style>
</head>
<body>
  <div class="sidebar-spacer"></div>
  <div class="main-workspace">
    <div class="mobile-nav-bar" onclick="openSidebar()">☰ <span style="font-size:14px; margin-left:12px; font-weight:600;">Menu</span></div>
    <div class="header-block">
      <div class="title-area">
        <h1>🎯 Performance Reviews</h1>
        <p>Employees ke monthly KPI scores, audit evaluation reviews registry matrix logs</p>
      </div>
      <button class="btn-action" id="addPerfBtn" style="display:none;" onclick="togglePerfModal(true)">➕ Grade Scorecard</button>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Review ID</th>
            <th>Employee ID</th>
            <th>Session</th>
            <th>KPI Score</th>
            <th>Remarks</th>
            <th>Reviewed By</th>
          </tr>
        </thead>
        <tbody id="perfRowsContainer">
          <tr><td colspan="6" style="padding:24px; text-align:center; color:var(--text-dim);">KPI metrics computing sync...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Performance Modal -->
  <div class="modal-overlay" id="perfModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 style="font-family:'Space Grotesk';">🎯 Evaluate Performance Score</h3>
        <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="togglePerfModal(false)">×</button>
      </div>
      <div class="modal-body">
        <form id="newPerfForm" onsubmit="submitPerfData(event)">
          <div class="form-group"><label>Employee Code ID *</label><input type="text" id="pEmp" required placeholder="e.g. EMP004"/></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div class="form-group"><label>Month *</label><input type="number" id="pMonth" min="1" max="12" required value="6"/></div>
            <div class="form-group"><label>Year *</label><input type="number" id="pYear" required value="2026"/></div>
          </div>
          <div class="form-group"><label>Overall Score Evaluation (Max 100) *</label><input type="number" id="pScore" min="0" max="100" required/></div>
          <div class="form-group"><label>Manager Feedback Remarks</label><input type="text" id="pRemarks"/></div>
          <button type="submit" class="btn-action" style="width: 100%; justify-content: center;">Submit Review Ledger</button>
        </form>
      </div>
    </div>
  </div>

<script src="app.js"></script>
<script>
  AppSession.protect();
  const TOKEN = AppSession.getToken();
  const USER = AppSession.getUser();

  document.addEventListener('DOMContentLoaded', () => {
    if(USER.role !== 'employee') { document.getElementById('addPerfBtn').style.display = 'block'; }
    loadPerformance();
  });

  function togglePerfModal(on) { document.getElementById('perfModal').style.display = on ? 'flex' : 'none'; if(!on) document.getElementById('newPerfForm').reset(); }

  async function loadPerformance() {
    try {
      const res = await fetch(`${API_URL}?action=getPerformance&token=${TOKEN}`);
      const payload = await res.json();
      if(payload.status === 'success') {
        const arr = payload.data;
        if(!arr || arr.length === 0) { document.getElementById('perfRowsContainer').innerHTML = '<tr><td colspan="6" style="text-align:center;">Koi scorecards register nahi hain.</td></tr>'; return; }
        document.getElementById('perfRowsContainer').innerHTML = arr.map(r => `
          <tr>
            <td><code>${r.perf_id}</code></td>
            <td><strong>${r.emp_id}</strong></td>
            <td>Month ${r.month} / ${r.year}</td>
            <td style="color:var(--brand-glow); font-weight:700;">📈 ${r.score} / 100</td>
            <td>${r.remarks || '—'}</td>
            <td><code>${r.reviewed_by}</code></td>
          </tr>
        `).join('');
      }
    } catch(e) { showToast('Performance index pull error.'); }
  }

  async function submitPerfData(e) {
    e.preventDefault();
    const payload = {
      token: TOKEN, action: 'savePerformance',
      emp_id: document.getElementById('pEmp').value.trim(),
      month: document.getElementById('pMonth').value,
      year: document.getElementById('pYear').value,
      score: document.getElementById('pScore').value,
      remarks: document.getElementById('pRemarks').value
    };
    try {
      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      const out = await res.json();
      if(out.status === 'success') { showToast('Scorecard added!'); togglePerfModal(false); loadPerformance(); }
    } catch(err) { showToast('Handshake runtime validation failed.'); }
  }
</script>
</body>
</html>
