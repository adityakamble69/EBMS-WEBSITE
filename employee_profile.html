<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Core Engine — Codeline.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-base: #0A0A0B;
            --glass: rgba(255, 255, 255, 0.045);
            --glass-strong: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.09);
            --glass-blur: 20px;
            --text-primary: #F4F4F5;
            --text-muted: #A1A1AA;
            --text-dim: #6B7280;
            --accent: #A8AFC4;
            --accent-glow: #D4D9E6;
            --success: #34D399;
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            background-image:
                radial-gradient(circle at 12% -10%, rgba(255, 255, 255, 0.05), transparent 45%),
                radial-gradient(circle at 90% 0%, rgba(255, 255, 255, 0.03), transparent 40%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar-spacer {
            width: 240px;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .sidebar-spacer {
                display: none;
            }
        }

        .main-workspace {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 600px) {
            .main-workspace {
                padding: 16px;
            }
        }

        .mobile-nav-bar {
            display: none;
            height: 50px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--glass-blur));
            border-radius: var(--radius-sm);
            align-items: center;
            padding: 0 16px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .mobile-nav-bar {
                display: flex;
            }
        }

        .profile-maxwidth-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .profile-banner-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--glass-blur)) saturate(140%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .profile-banner-card h2 {
            font-family: 'Space Grotesk', sans-serif;
        }

        .details-segment-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--glass-blur)) saturate(140%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .profile-fields-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (max-width: 540px) {
            .profile-fields-grid {
                grid-template-columns: 1fr;
            }
        }

        .data-node-viewer label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            display: block;
            margin-bottom: 4px;
        }

        .data-node-viewer .value-field {
            font-size: 14.5px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .data-node-viewer .editable-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            color: #fff;
            font-size: 14px;
            width: 100%;
            display: none;
            outline: none;
            transition: border-color 0.18s, background 0.18s;
        }

        .data-node-viewer .editable-input:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }

        .btn-secondary {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--glass-blur));
            color: #fff;
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            transition: background 0.18s;
        }

        .btn-secondary:hover {
            background: var(--glass-strong);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary-save {
            background: linear-gradient(135deg, #34D399 0%, #059669 100%);
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .btn-primary-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(52, 211, 153, 0.25);
        }

        .save-action-footer-panel {
            display: none;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>

<body>
    <div class="sidebar-spacer"></div>
    <div class="main-workspace">
        <div class="mobile-nav-bar" onclick="openSidebar()">☰ <span
                style="font-size:14px; margin-left:12px; font-weight:600;">Menu</span></div>
        <div class="profile-maxwidth-container">
            <a href="employees.html"
                style="color:var(--accent-glow); text-decoration:none; font-size:14px; display:block; margin-bottom:16px;">←
                Back to Directory</a>
            <div class="profile-banner-card">
                <div>
                    <h2 id="employeeProfileNameDisplay">Loading Name...</h2>
                    <p id="employeeProfileIdDisplay" style="color:var(--accent-glow); font-size:14px; margin-top:2px;">
                        EMP000</p>
                </div>
                <button class="btn-secondary" id="toggleEditBtn" onclick="toggleProfileEditableState(true)">✏️ Edit
                    Details</button>
            </div>
            <form id="profileUpdateFormEngine" onsubmit="processProfileMutationUpdate(event)">
                <div class="details-segment-card">
                    <div class="profile-fields-grid">
                        <div class="data-node-viewer"><label>Branch Code</label>
                            <div class="value-field" id="lblBranch">—</div><input type="text" id="inputBranch"
                                class="editable-input" required />
                        </div>
                        <div class="data-node-viewer"><label>Designation Title</label>
                            <div class="value-field" id="lblDesignation">—</div><input type="text" id="inputDesignation"
                                class="editable-input" required />
                        </div>
                        <div class="data-node-viewer" style="grid-column:1/-1; margin-top:12px;"><label>Mobile
                                Coordinate</label>
                            <div class="value-field" id="lblMobile">—</div><input type="tel" id="inputMobile"
                                class="editable-input" required />
                        </div>
                        <div class="data-node-viewer" style="grid-column:1/-1; margin-top:12px;"><label>Residential
                                Address</label>
                            <div class="value-field" id="lblAddress">—</div><input type="text" id="inputAddress"
                                class="editable-input" />
                        </div>
                    </div>
                </div>
                <div class="save-action-footer-panel" id="saveFooter">
                    <button type="button" class="btn-secondary"
                        onclick="toggleProfileEditableState(false)">Cancel</button>
                    <button type="submit" class="btn-primary-save">Save Parameters</button>
                </div>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        AppSession.protect();
        const args = new URLSearchParams(window.location.search);
        const empId = args.get('emp_id');
        let cacheData = null;

        if (!empId) { window.location.href = 'employees.html'; }

        document.addEventListener('DOMContentLoaded', () => { fetchProfile(); });

        async function fetchProfile() {
            try {
                const res = await fetch(`${API_URL}?action=getEmployee&token=${AppSession.getToken()}&emp_id=${empId}`);
                const payload = await res.json();
                if (payload.status === 'success') {
                    cacheData = payload.data;
                    bindFields(cacheData);
                }
            } catch (e) { showToast('Handshake sync tracking error.'); }
        }

        function bindFields(node) {
            document.getElementById('employeeProfileNameDisplay').textContent = node.name;
            document.getElementById('employeeProfileIdDisplay').textContent = `Tracking ID: ${node.emp_id}`;
            document.getElementById('lblBranch').textContent = node.branch_id;
            document.getElementById('lblDesignation').textContent = node.designation_id || 'Staff Regular';
            document.getElementById('lblMobile').textContent = node.mobile || '—';
            document.getElementById('lblAddress').textContent = node.address || '—';

            document.getElementById('inputBranch').value = node.branch_id;
            document.getElementById('inputDesignation').value = node.designation_id || '';
            document.getElementById('inputMobile').value = node.mobile || '';
            document.getElementById('inputAddress').value = node.address || '';
        }

        function toggleProfileEditableState(on) {
            document.querySelectorAll('.value-field').forEach(n => n.style.display = on ? 'none' : 'block');
            document.querySelectorAll('.editable-input').forEach(n => n.style.display = on ? 'block' : 'none');
            document.getElementById('saveFooter').style.display = on ? 'flex' : 'none';
            document.getElementById('toggleEditBtn').disabled = on;
            if (!on && cacheData) bindFields(cacheData);
        }

        async function processProfileMutationUpdate(e) {
            e.preventDefault();
            const payload = {
                token: AppSession.getToken(), action: 'updateEmployee', emp_id: empId,
                branch_id: document.getElementById('inputBranch').value,
                designation_id: document.getElementById('inputDesignation').value,
                mobile: document.getElementById('inputMobile').value,
                address: document.getElementById('inputAddress').value
            };
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const out = await res.json();
                if (out.status === 'success') { showToast('Saved profile configurations!'); toggleProfileEditableState(false); fetchProfile(); }
            } catch (err) { showToast('Sync error.'); }
        }
    </script>
</body>

</html>
