<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Branch Management — Codeline.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-dark: #0A0F1E; --brand-accent: #3B82F6; --brand-glow: #60A5FA;
      --surface: #111827; --surface2: #1F2937; --border: #1F2937; --border2: #374151;
      --text-primary: #F9FAFB; --text-muted: #9CA3AF; --text-dim: #6B7280;
      --success: #10B981; --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--brand-dark); color: var(--text-primary); min-height: 100vh; display: flex; }
    .sidebar-spacer { width: 240px; flex-shrink: 0; }
    @media (max-width: 768px) { .sidebar-spacer { display: none; } }
    .main-workspace { flex: 1; display: flex; flex-direction: column; min-height: 100vh; padding: 24px; overflow-x: hidden; }
    .mobile-nav-bar { display: none; height: 50px; background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; padding: 0 16px; font-size: 20px; color: var(--text-muted); cursor: pointer; }
    @media (max-width: 768px) { .mobile-nav-bar { display: flex; } }
    .header-block { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
    .title-area h1 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; }
    .btn-action { background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; width: 100%; }
    .data-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; min-width: 800px; }
    .data-table th { background: #1E40AF; color: #fff; padding: 14px 16px; font-weight: 600; }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .data-table tr:nth-child(even) td { background: rgba(59,130,246,0.02); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-card { background: var(--surface); border: 1px solid rgba(59,130,246,0.2); border-radius: var(--radius); max-width: 500px; width: 100%; }
    .modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 12.5px; color: var(--text-muted); text-transform: uppercase; }
    .form-group input { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: #fff; font-size: 14px; outline: none; }
  </style>
</head>
<body>
  <div class="sidebar-spacer"></div>
  <div class="main-workspace">
    <div class="mobile-nav-bar" onclick="openSidebar()">☰ <span style="font-size:14px; margin-left:12px; font-weight:600;">Menu</span></div>
    <div class="header-block">
      <div class="title-area">
        <h1>🏢 Branch Management</h1>
        <p>Manage and add the company's active branches and locations.</p>
      </div>
      <button class="btn-action" onclick="toggleBranchModal(true)">➕ Add New Branch</button>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Branch ID</th>
            <th>Branch Name</th>
            <th>City</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="branchesRowsContainer">
          <tr><td colspan="7" style="padding:24px; text-align:center; color:var(--text-dim);">Branches are loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add Branch Modal -->
  <div class="modal-overlay" id="addBranchModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 style="font-family:'Space Grotesk';">🏢 Add New Branch</h3>
        <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="toggleBranchModal(false)">×</button>
      </div>
      <div class="modal-body">
        <form id="newBranchForm" onsubmit="submitBranchData(event)">
          <div class="form-group"><label>Branch Name *</label><input type="text" id="bName" required/></div>
          <div class="form-group"><label>City *</label><input type="text" id="bCity" required/></div>
          <div class="form-group"><label>Address</label><input type="text" id="bAddress"/></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="bPhone"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="bEmail"/></div>
          <button type="submit" class="btn-action" style="width: 100%; justify-content: center; margin-top:10px;">Save Branch</button>
        </form>
      </div>
    </div>
  </div>

<script src="app.js"></script>
<script>
  AppSession.protect();
  const TOKEN = AppSession.getToken();

  document.addEventListener('DOMContentLoaded', () => { loadBranches(); });

  function toggleBranchModal(on) { document.getElementById('addBranchModal').style.display = on ? 'flex' : 'none'; if(!on) document.getElementById('newBranchForm').reset(); }

  async function loadBranches() {
    try {
      const res = await fetch(`${API_URL}?action=getBranches&token=${TOKEN}`);
      const payload = await res.json();
      if(payload.status === 'success') {
        document.getElementById('branchesRowsContainer').innerHTML = payload.data.map(b => `
          <tr>
            <td><code>${b.branch_id}</code></td>
            <td><strong>${b.branch_name}</strong></td>
            <td>${b.city}</td>
            <td>${b.address || '—'}</td>
            <td>${b.phone || '—'}</td>
            <td>${b.email || '—'}</td>
            <td><span style="color:var(--success); font-weight:600;">${b.status}</span></td>
          </tr>
        `).join('');
      }
    } catch(e) { showToast('Branches fetch karne me dikkat aayi.'); }
  }

  async function submitBranchData(e) {
    e.preventDefault();
    const payload = {
      token: TOKEN, action: 'addBranch',
      branch_name: document.getElementById('bName').value,
      city: document.getElementById('bCity').value,
      address: document.getElementById('bAddress').value,
      phone: document.getElementById('bPhone').value,
      email: document.getElementById('bEmail').value
    };
    try {
      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      const out = await res.json();
      if(out.status === 'success') { showToast('Branch successfully add ho gayi!'); toggleBranchModal(false); loadBranches(); }
      else showToast(out.message);
    } catch(err) { showToast('Network connectivity error.'); }
  }
</script>
</body>
</html>
