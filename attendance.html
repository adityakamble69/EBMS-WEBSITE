<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Manager — Codeline.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #0A0A0B;
      --glass: rgba(255, 255, 255, 0.045);
      --glass-strong: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.09);
      --glass-blur: 20px;
      --text-primary: #F4F4F5;
      --text-muted: #A1A1AA;
      --text-dim: #6B7280;
      --accent: #A8AFC4;
      --accent-glow: #D4D9E6;
      --success: #34D399;
      --warning: #FBBF24;
      --error: #F87171;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      background-image:
        radial-gradient(circle at 12% -10%, rgba(255, 255, 255, 0.05), transparent 45%),
        radial-gradient(circle at 90% 0%, rgba(255, 255, 255, 0.03), transparent 40%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    .sidebar-spacer {
      width: 240px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .sidebar-spacer {
        display: none;
      }
    }

    .main-workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }

    @media (max-width: 600px) {
      .main-workspace {
        padding: 16px;
      }
    }

    .mobile-nav-bar {
      display: none;
      height: 50px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur));
      border-radius: var(--radius-sm);
      align-items: center;
      padding: 0 16px;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .mobile-nav-bar {
        display: flex;
      }
    }

    .header-block {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-area h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
    }

    .title-area p {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .punch-card-wrapper {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .punch-card-wrapper {
        grid-template-columns: 1fr;
      }
    }

    .punch-engine-box {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .live-clock {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent-glow);
      margin: 10px 0 4px;
      letter-spacing: 1px;
    }

    .btn-punch {
      background: var(--glass-strong);
      color: #fff;
      border: 3px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur));
      border-radius: 50%;
      width: 120px;
      height: 120px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.06);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      margin: 16px 0;
    }

    .btn-punch:hover {
      transform: scale(1.03);
      box-shadow: 0 0 32px rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.14);
    }

    .filter-deck {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .input-date-picker,
    .dropdown-select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }

    .input-text-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      outline: none;
      flex: 1;
      min-width: 200px;
      transition: border-color 0.18s, background 0.18s;
    }

    .input-date-picker:focus,
    .dropdown-select:focus,
    .input-text-box:focus {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.07);
    }

    select option {
      background: #18181B;
      color: #fff;
    }

    @media (max-width: 600px) {
      .input-text-box {
        min-width: 100%;
      }

      .input-date-picker,
      .dropdown-select {
        flex: 1;
      }
    }

    @media (max-width: 900px) {
      .input-date-picker,
      .dropdown-select,
      .input-text-box {
        font-size: 16px;
      }
    }

    .table-container {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-radius: var(--radius);
      overflow-x: auto;
      width: 100%;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
      min-width: 850px;
    }

    .data-table th {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      padding: 14px 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tr:hover td {
      background: rgba(255, 255, 255, 0.025);
    }

    .data-table tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.015);
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 500;
      display: inline-block;
    }

    .badge-present {
      background: rgba(52, 211, 153, 0.12);
      color: #6EE7B7;
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .badge-absent {
      background: rgba(248, 113, 113, 0.12);
      color: #FCA5A5;
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .pagination-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 13.5px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: var(--glass);
      color: #fff;
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      backdrop-filter: blur(var(--glass-blur));
      transition: background 0.18s;
    }

    .btn-nav:hover:not(:disabled) {
      background: var(--glass-strong);
    }

    .btn-nav:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    @keyframes scanAnim {
      0%   { top: 8px; opacity: 1; }
      45%  { top: calc(100% - 10px); opacity: 1; }
      50%  { top: calc(100% - 10px); opacity: 0; }
      55%  { top: 8px; opacity: 0; }
      60%  { top: 8px; opacity: 1; }
      100% { top: 8px; opacity: 1; }
    }

    /* Punch success flash */
    @keyframes punchFlash {
      0%   { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
      70%  { box-shadow: 0 0 0 20px rgba(52,211,153,0); }
      100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
    }
    .punch-success-flash { animation: punchFlash 0.6s ease-out; }
  </style>
</head>

<body>

  <div class="sidebar-spacer"></div>

  <div class="main-workspace">
    <div class="mobile-nav-bar" onclick="openSidebar()">☰ <span
        style="font-size:14px; margin-left:12px; font-weight:600;">Menu</span></div>

    <div class="header-block">
      <div class="title-area">
        <h1>✅ Attendance Console</h1>
        <p>Real-time login/logout track records database ledger pipeline sync</p>
      </div>
    </div>


    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Transaction ID</th>
            <th>Employee ID</th>
            <th>Branch</th>
            <th>Date</th>
            <th>Punch In</th>
            <th>Punch Out</th>
            <th>Late Mins</th>
            <th>Status</th>
            <th>Remarks/Logs</th>
          </tr>
        </thead>
        <tbody id="attendanceLogsContainer">
          <tr>
            <td colspan="9" style="padding: 32px; text-align: center; color: var(--text-dim);">Logs stream structure
              updating... Please wait.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination-bar">
      <div id="paginationInfoDisplay">Showing 0-0 of 0 records</div>
      <div style="display:flex; gap:8px;">
        <button id="btnPrevPage" class="btn-nav" onclick="changePage(-1)" disabled>Previous</button>
        <button id="btnNextPage" class="btn-nav" onclick="changePage(1)" disabled>Next</button>
      </div>
    </div>
  </div>

  <!-- jsQR library for QR decoding from camera -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <script src="app.js"></script>
  <script>
    AppSession.protect();
    const AUTHENTICATED_SESSION_TOKEN = AppSession.getToken();

    let CURRENT_PAGE_TRACKER = 1;
    let TOTAL_PAGES_LIMIT = 1;
    let DEBOUNCE_TIMER_HOOK;

    // QR Scanner state
    let qrVideoStream = null;
    let qrAnimFrame = null;
    let qrCanvas = null;
    let qrCanvasCtx = null;
    let lastScannedCode = null;
    let scanCooldown = false;

    document.addEventListener('DOMContentLoaded', () => {
      initializeRuntimeClock();
      loadAttendanceMasterLogs();
      // Prepare off-screen canvas for QR decoding
      qrCanvas = document.createElement('canvas');
      qrCanvasCtx = qrCanvas.getContext('2d');
    });

    function initializeRuntimeClock() {
      setInterval(() => {
        const d = new Date();
        document.getElementById('livePortalTimeClock').textContent = d.toLocaleTimeString('en-US', { hour12: true });
        document.getElementById('livePortalDateDisplay').textContent = d.toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }, 1000);
    }

    // ── QR Scanner ──────────────────────────────────────────────
    async function startQrScanner() {
      const scanBox = document.getElementById('qrScannerBox');
      const startBtn = document.getElementById('startScanBtn');
      const video    = document.getElementById('qrVideo');

      try {
        qrVideoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = qrVideoStream;
        await video.play();
        scanBox.style.display = 'flex';
        startBtn.style.display = 'none';
        document.getElementById('scannerStatusMsg').textContent = 'Camera ready — QR code scan karo...';
        lastScannedCode = null;
        scanCooldown = false;
        requestAnimationFrame(tickScanLoop);
      } catch (err) {
        showToast('Camera access denied ya available nahi hai.');
      }
    }

    function stopQrScanner() {
      if (qrVideoStream) { qrVideoStream.getTracks().forEach(t => t.stop()); qrVideoStream = null; }
      if (qrAnimFrame)   { cancelAnimationFrame(qrAnimFrame); qrAnimFrame = null; }
      document.getElementById('qrScannerBox').style.display = 'none';
      document.getElementById('startScanBtn').style.display = 'flex';
      document.getElementById('punchButtonActionLabel').textContent = 'SCAN QR';
    }

    function tickScanLoop() {
      const video = document.getElementById('qrVideo');
      if (!qrVideoStream || video.readyState !== video.HAVE_ENOUGH_DATA) {
        qrAnimFrame = requestAnimationFrame(tickScanLoop);
        return;
      }

      qrCanvas.width  = video.videoWidth;
      qrCanvas.height = video.videoHeight;
      qrCanvasCtx.drawImage(video, 0, 0, qrCanvas.width, qrCanvas.height);
      const imageData = qrCanvasCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
      const decoded   = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });

      if (decoded && decoded.data && !scanCooldown) {
        const qrData = decoded.data.trim();
        // QR data format: EBMS:EMP001:EMP_NAME
        if (qrData.startsWith('EBMS:')) {
          const parts = qrData.split(':');
          const empId = parts[1];
          if (empId && empId !== lastScannedCode) {
            lastScannedCode = empId;
            scanCooldown = true;
            document.getElementById('scannerStatusMsg').textContent = `✅ QR detected: ${parts[2] || empId} — Processing...`;
            processPunchFromQR(empId);
            // Allow re-scan after 5 seconds
            setTimeout(() => {
              scanCooldown = false;
              lastScannedCode = null;
              if (qrVideoStream) document.getElementById('scannerStatusMsg').textContent = 'Next QR scan kar sakte ho...';
            }, 5000);
          }
        } else {
          document.getElementById('scannerStatusMsg').textContent = '⚠️ Invalid QR — EBMS QR code use karo';
        }
      }

      qrAnimFrame = requestAnimationFrame(tickScanLoop);
    }

    async function processPunchFromQR(empId) {
      const postPayload = {
        token:   AUTHENTICATED_SESSION_TOKEN,
        action:  'markAttendance',
        emp_id:  empId
      };

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(postPayload) });
        const out = await res.json();

        if (out.status === 'success') {
          const msg = out.message || `Punch logged for ${empId}!`;
          showToast('✅ ' + msg);
          document.getElementById('scannerStatusMsg').textContent = '✅ ' + msg;
          // Flash animation on scanner box
          const video = document.getElementById('qrVideo');
          video.style.borderColor = 'rgba(52,211,153,0.8)';
          setTimeout(() => { video.style.borderColor = ''; }, 1200);
          loadAttendanceMasterLogs();
        } else {
          showToast('❌ ' + (out.message || 'Punch error aaya.'));
          document.getElementById('scannerStatusMsg').textContent = '❌ ' + (out.message || 'Error. Dobara try karo.');
        }
      } catch (err) {
        showToast('Network error — punch register nahi hua.');
        document.getElementById('scannerStatusMsg').textContent = '⚠️ Network error. Retry karo.';
      }
    }

    // ── Attendance Logs ──────────────────────────────────────────
    function triggerLogSearch() {
      clearTimeout(DEBOUNCE_TIMER_HOOK);
      DEBOUNCE_TIMER_HOOK = setTimeout(() => { CURRENT_PAGE_TRACKER = 1; loadAttendanceMasterLogs(); }, 400);
    }

    async function loadAttendanceMasterLogs() {
      const empVal    = encodeURIComponent(document.getElementById('filterEmpId').value.trim());
      const dateVal   = document.getElementById('filterDate').value;
      const branchVal = document.getElementById('filterBranch').value;
      const ENDPOINT  = `${API_URL}?action=getAttendance&token=${AUTHENTICATED_SESSION_TOKEN}&page=${CURRENT_PAGE_TRACKER}&limit=12&emp_id=${empVal}&date=${dateVal}&branch_id=${branchVal}`;

      try {
        const res  = await fetch(ENDPOINT);
        const data = await res.json();
        if (data.status === 'success') {
          renderAttendanceRowsMatrix(data.data.data);
          updatePaginationNodeUI(data.data);
        } else {
          showToast(data.message || 'Attendance logs fetch error.');
        }
      } catch (err) { showToast('Network error loading attendance.'); }
    }

    function renderAttendanceRowsMatrix(logsArray) {
      const container = document.getElementById('attendanceLogsContainer');
      if (!logsArray || logsArray.length === 0) {
        container.innerHTML = `<tr><td colspan="9" style="padding:24px; text-align:center; color:var(--text-dim);">Koi logs nahi mile is filter ke liye.</td></tr>`;
        return;
      }
      container.innerHTML = logsArray.map(log => {
        const formattedDate = log.date ? new Date(log.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
        const statusClass   = log.status === 'present' ? 'badge-present' : 'badge-absent';
        return `
        <tr>
          <td><code style="color:var(--text-dim);">${log.att_id}</code></td>
          <td><strong style="color:var(--accent-glow);">${log.emp_id}</strong></td>
          <td>${log.branch_id || '—'}</td>
          <td>${formattedDate}</td>
          <td style="color:#6EE7B7; font-weight:500;">⏱️ ${formatTime12Hour(log.in_time)}</td>
          <td style="color:#FCA5A5; font-weight:500;">⏱️ ${formatTime12Hour(log.out_time)}</td>
          <td><span style="color:${log.late_minutes > 0 ? 'var(--warning)' : 'var(--text-dim)'};">${log.late_minutes || 0} mins</span></td>
          <td><span class="status-badge ${statusClass}">${log.status}</span></td>
          <td style="font-size:13px; color:var(--text-muted); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${log.remarks || ''}">${log.remarks || '—'}</td>
        </tr>`;
      }).join('');
    }

    function updatePaginationNodeUI(ctx) {
      CURRENT_PAGE_TRACKER = ctx.page;
      TOTAL_PAGES_LIMIT    = ctx.totalPages;
      document.getElementById('paginationInfoDisplay').textContent = `Showing page ${CURRENT_PAGE_TRACKER} of ${TOTAL_PAGES_LIMIT || 1} (${ctx.total} logs tracked)`;
      document.getElementById('btnPrevPage').disabled = CURRENT_PAGE_TRACKER <= 1;
      document.getElementById('btnNextPage').disabled = CURRENT_PAGE_TRACKER >= TOTAL_PAGES_LIMIT;
    }

    function changePage(deltaStep) {
      CURRENT_PAGE_TRACKER += deltaStep;
      loadAttendanceMasterLogs();
    }
  </script>
</body>

</html>
