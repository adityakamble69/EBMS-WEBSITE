<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks Tracking — Codeline.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:       #0A0A0B;
      --glass:         rgba(255,255,255,0.045);
      --glass-strong:  rgba(255,255,255,0.08);
      --glass-border:  rgba(255,255,255,0.09);
      --glass-blur:    20px;
      --text-primary:  #F4F4F5;
      --text-muted:    #A1A1AA;
      --text-dim:      #52525B;
      --success:       #34D399;
      --warning:       #FBBF24;
      --danger:        #F87171;
      --radius:        16px;
      --radius-sm:     10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(255,255,255,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 100%, rgba(255,255,255,0.025) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    .sidebar-spacer { width: 240px; flex-shrink: 0; }
    @media (max-width: 768px) { .sidebar-spacer { display: none; } }

    .main-workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px;
      overflow-x: hidden;
    }
    @media (max-width: 600px) { .main-workspace { padding: 14px; } }

    .mobile-nav-bar {
      display: none;
      height: 48px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur));
      border-radius: var(--radius-sm);
      align-items: center;
      padding: 0 16px;
      font-size: 20px;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 16px;
      gap: 10px;
    }
    @media (max-width: 768px) { .mobile-nav-bar { display: flex; } }

    .header-block {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 14px;
      flex-wrap: wrap;
    }
    .title-area h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; }
    .title-area p  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    @media (max-width: 760px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
    }
    .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; }

    /* Filter bar */
    .filter-bar {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      backdrop-filter: blur(var(--glass-blur));
    }
    .filter-bar input,
    .filter-bar select {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .filter-bar input { min-width: 180px; flex: 1; }
    .filter-bar select { min-width: 130px; }
    .filter-bar select option { background: #1a1a1c; }

    .btn-action {
      background: var(--glass-strong);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      backdrop-filter: blur(var(--glass-blur));
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .btn-action:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.18); transform: translateY(-1px); }

    /* Table */
    .table-container {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow-x: auto;
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      width: 100%;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 13.5px;
      min-width: 720px;
    }
    .data-table th {
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
      padding: 13px 16px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-muted);
    }
    .data-table td:first-child, .data-table td strong { color: var(--text-primary); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.025); }

    /* Badges */
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      display: inline-block;
    }
    .badge-pending   { background: rgba(251,191,36,0.12); color: #FCD34D; }
    .badge-completed { background: rgba(52,211,153,0.12); color: #6EE7B7; }
    .badge-high      { background: rgba(248,113,113,0.12); color: #FCA5A5; }
    .badge-medium    { background: rgba(251,191,36,0.12);  color: #FCD34D; }
    .badge-low       { background: rgba(161,161,170,0.12); color: #A1A1AA; }

    .btn-done {
      background: rgba(52,211,153,0.10);
      border: 1px solid rgba(52,211,153,0.22);
      color: #34D399;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.18s, transform 0.15s;
    }
    .btn-done:hover { background: rgba(52,211,153,0.2); transform: translateY(-1px); }

    /* Pagination */
    .pagination-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 13px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn-page {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-page:hover { background: var(--glass-strong); }
    .btn-page:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-card {
      background: rgba(18,18,20,0.92);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      max-width: 480px;
      width: 100%;
      backdrop-filter: blur(28px) saturate(160%);
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(18,18,20,0.95);
      backdrop-filter: blur(20px);
      z-index: 1;
    }
    .modal-header h3 { font-family: 'Space Grotesk', sans-serif; font-size: 16px; }
    .modal-body { padding: 22px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
    .form-group label { font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.18s, background 0.18s;
      resize: none;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--text-dim); }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: rgba(255,255,255,0.22); background: var(--glass-strong); }
    .form-group select option { background: #1a1a1c; color: var(--text-primary); }

    .btn-submit {
      width: 100%;
      background: rgba(244,244,245,0.9);
      color: #0A0A0B;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: #ffffff; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      background: var(--glass-strong);
      border: 1px solid var(--glass-border);
      border-radius: 5px;
      padding: 2px 6px;
      color: var(--text-muted);
    }

    .empty-note {
      padding: 36px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="sidebar-spacer"></div>

  <div class="main-workspace">
    <div class="mobile-nav-bar" onclick="openSidebar()">
      ☰ <span style="font-size:14px; font-weight:600;">Menu</span>
    </div>

    <div class="header-block">
      <div class="title-area">
        <h1>📋 Tasks Tracking</h1>
        <p>Employees ko tasks assign karein aur completion track karein</p>
      </div>
      <button class="btn-action" id="createTaskBtn" style="display:none;" onclick="toggleModal(true)">
        ➕ Assign Task
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending" style="color:var(--warning);">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="statCompleted" style="color:var(--success);">—</div>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍 Task title ya Employee ID search karein..." oninput="applyFilters()"/>
      <select id="filterStatus" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
      </select>
      <select id="filterPriority" onchange="applyFilters()">
        <option value="">All Priority</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Task ID</th>
            <th>Title</th>
            <th>Assigned To</th>
            <th>Due Date</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tasksBody">
          <tr><td colspan="7" class="empty-note">Tasks load ho rahe hain...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-bar">
      <span id="paginationInfo">—</span>
      <div style="display:flex; gap:8px;">
        <button class="btn-page" id="btnPrev" onclick="changePage(-1)" disabled>← Prev</button>
        <button class="btn-page" id="btnNext" onclick="changePage(1)" disabled>Next →</button>
      </div>
    </div>
  </div>

  <!-- Assign Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>📋 Assign New Task</h3>
        <button style="background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; line-height:1;" onclick="toggleModal(false)">×</button>
      </div>
      <div class="modal-body">
        <form id="taskForm" onsubmit="submitTask(event)">
          <div class="form-group">
            <label>Task Title *</label>
            <input type="text" id="tTitle" required placeholder="e.g. Monthly Report Submit"/>
          </div>
          <div class="form-group">
            <label>Assign To (Employee ID) *</label>
            <input type="text" id="tEmp" required placeholder="e.g. EMP004"/>
          </div>
          <div class="form-group">
            <label>Due Date *</label>
            <input type="date" id="tDate" required/>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="tPriority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="tDesc" rows="3" placeholder="Task details likhein..."></textarea>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">Assign Task</button>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    AppSession.protect();
    const TOKEN = AppSession.getToken();
    const USER  = AppSession.getUser();

    const priorityClass = { high: 'badge-high', medium: 'badge-medium', low: 'badge-low' };

    let ALL_TASKS = [];
    let currentPage = 1;
    const PAGE_LIMIT = 15;

    document.addEventListener('DOMContentLoaded', () => {
      if (USER.role !== 'employee') {
        document.getElementById('createTaskBtn').style.display = 'inline-flex';
      }
      loadTasks();
    });

    function toggleModal(on) {
      document.getElementById('taskModal').style.display = on ? 'flex' : 'none';
      if (!on) document.getElementById('taskForm').reset();
    }

    async function loadTasks() {
      try {
        const res     = await fetch(`${API_URL}?action=getTasks&token=${TOKEN}&limit=200`);
        const payload = await res.json();
        if (payload.status === 'success') {
          ALL_TASKS = (payload.data && payload.data.data) || payload.data || [];
          updateStats();
          applyFilters();
        } else {
          showToast(payload.message || 'Tasks load nahi hue.');
        }
      } catch (e) { showToast('Tasks load nahi ho paye.'); }
    }

    function updateStats() {
      document.getElementById('statTotal').textContent     = ALL_TASKS.length;
      document.getElementById('statPending').textContent   = ALL_TASKS.filter(t => t.status === 'pending').length;
      document.getElementById('statCompleted').textContent = ALL_TASKS.filter(t => t.status === 'completed').length;
    }

    function applyFilters() {
      const search   = document.getElementById('searchInput').value.toLowerCase();
      const status   = document.getElementById('filterStatus').value;
      const priority = document.getElementById('filterPriority').value;

      let filtered = ALL_TASKS.filter(t => {
        const matchSearch   = !search   || t.title.toLowerCase().includes(search) || (t.assigned_to || '').toLowerCase().includes(search);
        const matchStatus   = !status   || t.status === status;
        const matchPriority = !priority || t.priority === priority;
        return matchSearch && matchStatus && matchPriority;
      });

      currentPage = 1;
      renderTable(filtered);
    }

    function renderTable(tasks) {
      const start  = (currentPage - 1) * PAGE_LIMIT;
      const page   = tasks.slice(start, start + PAGE_LIMIT);
      const total  = tasks.length;
      const pages  = Math.ceil(total / PAGE_LIMIT);

      document.getElementById('paginationInfo').textContent =
        total === 0 ? 'Koi tasks nahi' : `${start + 1}–${Math.min(start + PAGE_LIMIT, total)} of ${total} tasks`;
      document.getElementById('btnPrev').disabled = currentPage <= 1;
      document.getElementById('btnNext').disabled = currentPage >= pages;

      // Store filtered for pagination
      window._filteredTasks = tasks;

      if (page.length === 0) {
        document.getElementById('tasksBody').innerHTML = '<tr><td colspan="7" class="empty-note">Koi tasks nahi hain is filter mein.</td></tr>';
        return;
      }

      document.getElementById('tasksBody').innerHTML = page.map(t => {
        const isOwner  = USER.employee_id === t.assigned_to;
        const canDone  = t.status !== 'completed' && (isOwner || USER.role !== 'employee');
        const dueDate  = t.due_date
          ? new Date(t.due_date).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })
          : '—';
        const isOverdue = t.due_date && new Date(t.due_date) < new Date() && t.status !== 'completed';

        return `
          <tr>
            <td><code>${t.task_id}</code></td>
            <td>
              <strong>${t.title}</strong>
              ${t.description ? `<div style="font-size:11.5px; color:var(--text-dim); margin-top:2px;">${t.description.slice(0,60)}${t.description.length > 60 ? '…' : ''}</div>` : ''}
            </td>
            <td><code style="font-size:11px;">${t.assigned_to}</code></td>
            <td style="font-size:13px; ${isOverdue ? 'color:var(--danger);' : ''}">${dueDate}${isOverdue ? ' ⚠️' : ''}</td>
            <td><span class="badge ${priorityClass[t.priority] || 'badge-low'}">${(t.priority || '').toUpperCase()}</span></td>
            <td><span class="badge ${t.status === 'completed' ? 'badge-completed' : 'badge-pending'}">${t.status}</span></td>
            <td>
              ${canDone
                ? `<button class="btn-done" onclick="markComplete('${t.task_id}')">Done ✓</button>`
                : `<span style="color:var(--text-dim); font-size:12px;">${t.status === 'completed' ? 'Complete' : '—'}</span>`
              }
            </td>
          </tr>
        `;
      }).join('');
    }

    function changePage(delta) {
      currentPage += delta;
      renderTable(window._filteredTasks || ALL_TASKS);
    }

    async function markComplete(taskId) {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ token: TOKEN, action: 'updateTask', task_id: taskId, status: 'completed' })
        });
        const out = await res.json();
        if (out.status === 'success') {
          showToast('Task complete ho gaya! ✓');
          loadTasks();
        } else { showToast(out.message || 'Update error.'); }
      } catch (e) { showToast('Network error.'); }
    }

    async function submitTask(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Assigning...';

      const payload = {
        token:       TOKEN,
        action:      'addTask',
        title:       document.getElementById('tTitle').value.trim(),
        assigned_to: document.getElementById('tEmp').value.trim(),
        due_date:    document.getElementById('tDate').value,
        priority:    document.getElementById('tPriority').value,
        description: document.getElementById('tDesc').value.trim()
      };

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const out = await res.json();
        if (out.status === 'success') {
          showToast('Task successfully assign ho gaya!');
          toggleModal(false);
          loadTasks();
        } else { showToast(out.message || 'Error aaya.'); }
      } catch (err) { showToast('Network error.'); }
      finally { btn.disabled = false; btn.textContent = 'Assign Task'; }
    }
  </script>
</body>
</html>
